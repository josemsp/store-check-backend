runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        if (!body.access_token) {
          throw new Error("No se encontró access_token");
        }

        bru.setVar("auth_token", body.access_token);
        bru.setGlobalVar("auth_token", body.access_token);

